name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tengu-init-linux-amd64
            deb: tengu-init_amd64.deb
            label: linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tengu-init-linux-arm64
            deb: tengu-init_arm64.deb
            label: linux-arm64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tengu-init-apple-silicon
            deb: ""
            label: apple-silicon
            cross: false

    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install cargo-deb
        if: matrix.deb != ''
        run: cargo install cargo-deb

      - name: Build with cross
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build native
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build deb (native)
        if: matrix.deb != '' && !matrix.cross
        run: cargo deb --no-build --target ${{ matrix.target }} --output ${{ matrix.deb }}

      - name: Build deb (cross)
        if: matrix.deb != '' && matrix.cross
        run: cargo deb --no-build --no-strip --target ${{ matrix.target }} --output ${{ matrix.deb }}

      # macOS signing and notarization
      - name: Import certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm /tmp/certificate.p12

      - name: Sign binary
        if: runner.os == 'macOS'
        run: |
          codesign --force --options runtime --sign "Developer ID Application: Adam Ladachowski (TD4G3U97DW)" \
            target/${{ matrix.target }}/release/tengu-init
          codesign -dv target/${{ matrix.target }}/release/tengu-init

      - name: Notarize binary
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          zip -j tengu-init.zip target/${{ matrix.target }}/release/tengu-init
          xcrun notarytool submit tengu-init.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          rm tengu-init.zip
          # Note: Standalone Mach-O binaries cannot be stapled (only .app/.dmg/.pkg).
          # Gatekeeper will verify notarization online with Apple's servers.

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/tengu-init ${{ matrix.artifact }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload deb
        if: matrix.deb != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.deb }}
          path: ${{ matrix.deb }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-homebrew:
    name: update-homebrew
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute checksums
        id: checksums
        run: |
          for asset in tengu-init-apple-silicon tengu-init-linux-amd64 tengu-init-linux-arm64; do
            curl -fsSL "https://github.com/tengu-apps/tengu-init/releases/download/${GITHUB_REF_NAME}/${asset}" -o "${asset}"
            sha=$(sha256sum "${asset}" | cut -d' ' -f1)
            key=$(echo "${asset}" | tr '-' '_')
            echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_MACOS="${{ steps.checksums.outputs.tengu_init_apple_silicon }}"
          SHA_LINUX_AMD="${{ steps.checksums.outputs.tengu_init_linux_amd64 }}"
          SHA_LINUX_ARM="${{ steps.checksums.outputs.tengu_init_linux_arm64 }}"

          cat > /tmp/tengu-init.rb <<EOF
          class TenguInit < Formula
            desc "Provision Tengu PaaS servers via SSH"
            homepage "https://github.com/tengu-apps/tengu-init"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/tengu-apps/tengu-init/releases/download/v#{version}/tengu-init-apple-silicon"
                sha256 "${SHA_MACOS}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/tengu-apps/tengu-init/releases/download/v#{version}/tengu-init-linux-arm64"
                sha256 "${SHA_LINUX_ARM}"
              end

              on_intel do
                url "https://github.com/tengu-apps/tengu-init/releases/download/v#{version}/tengu-init-linux-amd64"
                sha256 "${SHA_LINUX_AMD}"
              end
            end

            def install
              binary = Dir["tengu-init-*"].first || "tengu-init"
              bin.install binary => "tengu-init"
            end

            test do
              assert_match "tengu-init", shell_output("#{bin}/tengu-init --version")
            end
          end
          EOF

          sed -i 's/^          //' /tmp/tengu-init.rb

          CONTENT=$(base64 -w0 /tmp/tengu-init.rb)
          SHA=$(gh api repos/tengu-apps/homebrew-tap/contents/Formula/tengu-init.rb --jq '.sha')

          gh api repos/tengu-apps/homebrew-tap/contents/Formula/tengu-init.rb \
            -X PUT \
            -f message="Update tengu-init to ${VERSION}" \
            -f content="${CONTENT}" \
            -f sha="${SHA}"

